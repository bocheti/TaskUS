<div class="screen-layout">
  <app-landing-banner></app-landing-banner>

  <div class="content-side">
    <div class="content-wrapper">
      <div class="title-container">
        <h1 class="form-title">Create an Organisation</h1>
      </div>

      <form [formGroup]="createOrgForm" (ngSubmit)="onSubmit()" class="org-form">
        
        <div class="input-group">
          <label for="orgName" class="input-label">Organisation Name</label>
          <input
            id="orgName"
            type="text"
            formControlName="orgName"
            class="form-input"
            placeholder="Enter your organisation name"
            required
          />
        </div>

        <div class="name-row">
          <div class="input-group">
            <label for="firstName" class="input-label">First Name</label>
            <input
              id="firstName"
              type="text"
              formControlName="firstName"
              class="form-input"
              placeholder="First name"
              required
            />
          </div>
          <div class="input-group">
            <label for="lastName" class="input-label">Last Name</label>
            <input
              id="lastName"
              type="text"
              formControlName="lastName"
              class="form-input"
              placeholder="Last name"
              required
            />
          </div>
        </div>

        <div class="input-group">
          <label for="email" class="input-label">Email address</label>
          <input
            id="email"
            type="email"
            formControlName="email"
            class="form-input"
            placeholder="Enter your email"
            required
          />
        </div>

        <div class="input-group">
          <label for="password" class="input-label">Password</label>
          <input
            id="password"
            type="password"
            formControlName="password"
            class="form-input"
            placeholder="Enter your password"
            required
          />
        </div>

        <div class="input-group">
          <label for="repeatPassword" class="input-label">Repeat Password</label>
          <input
            id="repeatPassword"
            type="password"
            formControlName="repeatPassword"
            class="form-input"
            placeholder="Repeat your password"
            required
          />
        </div>

        <div class="submit-container">
          <button
            type="submit"
            [disabled]="isLoading"
            class="submit-btn"
          >
            {{ isLoading ? 'Creating...' : 'Create Organisation' }}
          </button>
        </div>
      </form>
      
      <div class="bottom-links-container">
        <p class="bottom-text">
          Already have an account? 
          <a routerLink="/login" class="bottom-link">Log in</a>
        </p>
      </div>
    </div>
  </div>
</div>
