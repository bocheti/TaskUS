<div class="screen-layout">
  <app-landing-banner></app-landing-banner>

  <div class="content-side">
    <div class="content-wrapper">
      <div class="title-container">
        <h1 class="form-title">Reset Password</h1>
        <p class="description-text">
          Enter your new password below.
        </p>
      </div>

      <form [formGroup]="resetForm" (ngSubmit)="onSubmit()" class="reset-form">
        <div class="input-group">
          <label for="newPassword" class="input-label">New Password</label>
          <input
            id="newPassword"
            type="password"
            formControlName="newPassword"
            class="form-input"
            placeholder="Enter your new password"
            required
            [disabled]="isLoading"
          />
        </div>

        <div class="input-group">
          <label for="repeatPassword" class="input-label">Repeat Password</label>
          <input
            id="repeatPassword"
            type="password"
            formControlName="repeatPassword"
            class="form-input"
            placeholder="Repeat your new password"
            required
            [disabled]="isLoading"
          />
        </div>

        <div class="submit-container">
          <button
            type="submit"
            [disabled]="isLoading"
            class="submit-btn"
          >
            {{ isLoading ? 'Resetting...' : 'Reset Password' }}
          </button>
        </div>
      </form>

      <div class="bottom-links-container">
        <p class="bottom-text">
          Remember your password? 
          <a routerLink="/login" class="bottom-link">Log in</a>
        </p>
      </div>
    </div>
  </div>
</div>
