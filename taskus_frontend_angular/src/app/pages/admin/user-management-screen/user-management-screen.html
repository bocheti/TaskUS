<app-authorized-layout pageTitle="User Management">
  <div class="screen-container">
    
    <div class="tab-container">
      <div class="tab-pill">
        <button 
          class="tab-btn" 
          [class.active]="activeTab === 'users'" 
          (click)="setActiveTab('users')">
          Users
          <span class="count">({{ users.length }})</span>
        </button>
        <button 
          class="tab-btn" 
          [class.active]="activeTab === 'requests'" 
          (click)="setActiveTab('requests')">
          Requests
          <span class="count">({{ requests.length }})</span>
        </button>
      </div>
    </div>

    @if (isLoading) {
      <div class="loading-state">Loading...</div>
    } @else {
      
      @if (activeTab === 'users') {
        <div class="list-container">
          @if (users.length === 0) {
            <div class="empty-state">
              <p>No users found</p>
            </div>
          } @else {
            @for (user of users; track user.id) {
              <app-user-card 
                [user]="user" 
                (deleted)="fetchData()">
              </app-user-card>
            }
          }
        </div>
      } @else {
        <div class="list-container">
          @if (requests.length === 0) {
            <div class="empty-state">
              <mat-icon svgIcon="user-plus" class="empty-icon"></mat-icon>
              <p>No pending requests</p>
            </div>
          } @else {
            @for (request of requests; track request.id) {
              <app-user-request-card 
                [request]="request"
                (accept)="handleAcceptRequest($event)"
                (reject)="handleRejectRequest($event)">
              </app-user-request-card>
            }
          }
        </div>
      }
      
    }
  </div>
</app-authorized-layout>
