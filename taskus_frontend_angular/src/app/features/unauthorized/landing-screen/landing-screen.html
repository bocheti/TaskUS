<div class="screen-layout">
  <app-landing-banner></app-landing-banner>
  
  <div class="content-side">
    <div class="content-wrapper">
      <div class="text-center">
        <h1 class="welcome-title">Welcome to Taskus!</h1>
        <p class="welcome-desc">
          Your new favourite task manager. No nonsense, no complications, no useless features. Just straightforward task management for straightforward businesses.
        </p>
      </div>

      <div class="actions-container">
        <div class="action-block">
          <p class="action-text">Do you already have an account?</p>
          <a routerLink="/login" class="action-btn">Log in</a>
        </div>

        <div class="action-block">
          <p class="action-text">Don't have an account?</p>
          <a routerLink="/request" class="action-btn">Request Account</a>
        </div>

        <div class="action-block">
          <p class="action-text">Are you a business?</p>
          <a routerLink="/create-org" class="action-btn">Create Organisation</a>
        </div>
      </div>
    </div>
  </div>
</div>
