<div class="layout-wrapper">
  
  <button 
    (click)="isSidebarOpen = true" 
    class="mobile-menu-btn">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/>
    </svg>
  </button>

  <app-sidebar 
    [isOpen]="isSidebarOpen" 
    (closeSidebar)="isSidebarOpen = false">
  </app-sidebar>

  <div class="main-content">
    
    <div class="header-section">
      <h1 class="page-title">{{ title }}</h1>
      <hr class="title-divider" />
    </div>

    <div class="content-card">
      <div class="content-body">
        <ng-content></ng-content>
      </div>

      <div class="footer">
        <p class="footer-text">
          Made By Salvador Ramón Espinosa Merino
        </p>
        
        <div class="social-links">
          <button (click)="handleGithubClick()" class="social-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M15 22v-4a4.8 4.8 0 0 0-1-3.02c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A4.8 4.8 0 0 0 9 18v4"/><path d="M9 18c-4.51 2-5-2-7-2"/>
            </svg>
          </button>
          <button (click)="handleLinkedinClick()" class="social-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect width="4" height="12" x="2" y="9"/><circle cx="4" cy="4" r="2"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

  </div>
</div>
