<div class="layout-wrapper">
  
  <button 
    (click)="isSidebarOpen = true" 
    class="mobile-menu-btn">
    <mat-icon svgIcon="mobile-menu-btn"></mat-icon>
  </button>

  <app-sidebar 
    [isOpen]="isSidebarOpen" 
    (closeSidebar)="isSidebarOpen = false">
  </app-sidebar>

  <div class="main-content">
    
    <div class="header-section">
      <h1 class="page-title">{{ title }}</h1>
      <hr class="title-divider" />
    </div>

    <div class="content-card">
      <div class="content-body">
        <ng-content></ng-content>
      </div>

      <div class="footer">
        <p class="footer-text">
          Made By Salvador Ramón Espinosa Merino
        </p>
        
        <div class="social-links">
          <button (click)="handleGithubClick()" class="social-btn">
            <mat-icon svgIcon="github"></mat-icon>
          </button>
          <button (click)="handleLinkedinClick()" class="social-btn">
            <mat-icon svgIcon="linkedin"></mat-icon>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
