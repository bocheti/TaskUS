<div 
  *ngIf="isOpen" 
  class="mobile-overlay"
  (click)="closeSidebar.emit()">
</div>

<div class="sidebar-container" [class.is-open]="isOpen">
  
  <button (click)="closeSidebar.emit()" class="mobile-close-btn">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M18 6 6 18"/><path d="m6 6 12 12"/>
    </svg>
  </button>

  <div class="logo-section">
    <a routerLink="/about-us" (click)="handleLinkClick()">
      <img 
        src="/bannerLogo.svg" 
        alt="TaskUS Logo" 
        class="sidebar-logo" 
      />
    </a>
  </div>

  <nav class="nav-container" *ngIf="authService.user$ | async as user">
    
    <a routerLink="/dashboard" (click)="handleLinkClick()" class="nav-link" [class.active]="isActive('/dashboard')">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span class="nav-text">Dashboard</span>
    </a>

    <a routerLink="/projects" (click)="handleLinkClick()" class="nav-link" [class.active]="isActive('/projects')">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M3 9h18"/><path d="M3 15h18"/><path d="M9 3v18"/><path d="M15 3v18"/></svg>
      <span class="nav-text">Projects</span>
    </a>

    <ng-container *ngIf="user.role === 'admin'">
      <div class="divider-container">
        <hr class="nav-divider" />
      </div>

      <a routerLink="/admin/users" (click)="handleLinkClick()" class="nav-link" [class.active]="isActive('/admin/users')">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <span class="nav-text">Users</span>
      </a>

      <a routerLink="/admin/organisation" (click)="handleLinkClick()" class="nav-link" [class.active]="isActive('/admin/organisation')">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"/><path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"/><path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"/><path d="M10 6h4"/><path d="M10 10h4"/><path d="M10 14h4"/><path d="M10 18h4"/></svg>
        <span class="nav-text">Organisation</span>
      </a>
    </ng-container>

  </nav>

  <div class="profile-section" #profileRef>
    <button (click)="toggleProfile()" class="nav-link w-full" [class.active]="isActive('/profile')">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span class="nav-text">Profile</span>
    </button>

    <div *ngIf="isProfileOpen" class="profile-dropdown">
      <button 
        (click)="router.navigate(['/profile']); handleLinkClick(); isProfileOpen = false" 
        class="dropdown-item rounded-top">
        View Profile
      </button>

      <button 
        (click)="handleLogout(); isProfileOpen = false" 
        class="dropdown-item text-danger rounded-bottom">
        Log out
      </button>
    </div>
  </div>

</div>
