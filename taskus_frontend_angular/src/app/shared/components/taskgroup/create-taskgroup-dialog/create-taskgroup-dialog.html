@if (isOpen) {
  <div class="modal-wrapper">
    <div class="modal-backdrop" (click)="handleCancel()"></div>
    
    <div class="modal-content">
      <div class="modal-header">
        <div>
          <h2 class="modal-title">Create Task Group</h2>
          <p class="modal-subtitle">Organize tasks into groups</p>
        </div>
        <button class="close-btn" (click)="handleCancel()">
          <mat-icon svgIcon="x"></mat-icon>
        </button>
      </div>

      <form (ngSubmit)="handleSubmit()" class="modal-form">
        <div class="form-group">
          <label for="taskgroup-title" class="form-label">
            Task Group Title <span class="required-asterisk">*</span>
          </label>
          <input
            id="taskgroup-title"
            name="title"
            type="text"
            [(ngModel)]="title"
            placeholder="Enter task group title"
            maxlength="100"
            [disabled]="isSubmitting"
            class="form-input"
            autofocus
          />
        </div>

        <div class="form-group">
          <label for="taskgroup-description" class="form-label">Description</label>
          <textarea
            id="taskgroup-description"
            name="description"
            [(ngModel)]="description"
            placeholder="Enter task group description (optional)"
            rows="4"
            maxlength="500"
            [disabled]="isSubmitting"
            class="form-textarea"
          ></textarea>
          <p class="char-count">{{ description.length }} / 500</p>
        </div>

        <div class="modal-actions">
          <button 
            type="button" 
            class="btn-outline" 
            (click)="handleCancel()" 
            [disabled]="isSubmitting">
            Cancel
          </button>
          
          <button 
            type="submit" 
            class="btn-primary" 
            [disabled]="isSubmitting || !title.trim()">
            {{ isSubmitting ? 'Creating...' : 'Create Task Group' }}
          </button>
        </div>
      </form>
    </div>
  </div>
}
