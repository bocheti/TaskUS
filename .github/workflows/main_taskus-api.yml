name: Build, Test, and Deploy Docker Backend

on:
  push:
    branches:
      - main
    paths:
      - 'taskus_backend/**'
  workflow_dispatch:

jobs:
  build-test-and-deploy:
    runs-on: ubuntu-latest

    # --- 1. SPIN UP THE TEMPORARY TEST DATABASE ---
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # --- 2. SETUP NODE FOR TESTING ---
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      # --- 3. RUN TESTS WITH MOCK VARIABLES ---
      - name: Install, Build, and Test
        working-directory: ./taskus_backend
        env:
          DATABASE_URL: postgresql://testuser:testpassword@localhost:5432/testdb
          RESEND_API_KEY: "re_fakekey_123456789"
          EMAIL_FROM: "noreply@taskus.app"
          AZURE_STORAGE_CONNECTION_STRING: "DefaultEndpointsProtocol=https;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;EndpointSuffix=core.windows.net"
          JWT_SECRET: "super_secret_test_key_123"
        run: |
          npm install
          npx prisma generate
          npm run build --if-present
          npx prisma db push 
          npm run test:ci --if-present

      # --- 4. BUILD & PUSH DOCKER IMAGE ---
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./taskus_backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/taskus-backend:latest
            ghcr.io/${{ github.repository_owner }}/taskus-backend:${{ github.sha }}

      # --- 5. DEPLOY TO AZURE ---
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'taskus-api-docker'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_DOCKER }}
          images: 'ghcr.io/${{ github.repository_owner }}/taskus-backend:${{ github.sha }}'