name: Build and Deploy Docker Backend

on:
  push:
    branches:
      - main
    paths:
      - 'taskus_backend/**' # Only trigger if files in the backend folder change
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./taskus_backend
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/taskus-backend:latest

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'taskus-api-docker'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_DOCKER }}
          images: 'ghcr.io/${{ github.repository_owner }}/taskus-backend:latest'